<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Passport Photo Maker</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h2{
text-align:center;
}

.controls{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
}

canvas{
border:1px solid #ccc;
margin:10px;
}

</style>

</head>

<body>

<h2>School Passport Photo Sheet Maker</h2>

<div class="controls">

Upload Photos
<br>
<input type="file" id="upload" multiple accept="image/*">

<br><br>

Duplicates (if one photo)
<br>
<input type="number" id="duplicates" value="8" min="1">

<br><br>

Brightness
<br>
<input type="range" id="brightness" min="80" max="140" value="100">

<br><br>

<button onclick="generateSheets()">Generate Sheets</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="preview"></div>

<script>

const DPI = 300

const pageWidth = 6 * DPI
const pageHeight = 4 * DPI

const photoWidth = 1.5 * DPI
const photoHeight = 2 * DPI

let pages=[]

function generateSheets(){

pages=[]

const files=document.getElementById("upload").files
const duplicates=parseInt(document.getElementById("duplicates").value)
const brightness=document.getElementById("brightness").value

const preview=document.getElementById("preview")
preview.innerHTML=""

if(files.length===0){
alert("Please upload photos")
return
}

let images=[]
let loaded=0

for(let file of files){

let img=new Image()

img.onload=function(){

images.push(img)
loaded++

if(loaded===files.length){

processImages(images,duplicates,brightness)

}

}

img.src=URL.createObjectURL(file)

}

}

function processImages(images,duplicates,brightness){

let photoList=[]

if(images.length===1){

for(let i=0;i<duplicates;i++){
photoList.push(images[0])
}

}else{

photoList=images

}

let perPage=8
let totalPages=Math.ceil(photoList.length/perPage)

for(let p=0;p<totalPages;p++){

let canvas=document.createElement("canvas")
canvas.width=pageWidth
canvas.height=pageHeight

let ctx=canvas.getContext("2d")

ctx.filter="brightness("+brightness+"%) contrast(105%)"

let positions=[
[0,0],[450,0],[900,0],[1350,0],
[0,600],[450,600],[900,600],[1350,600]
]

for(let i=0;i<8;i++){

let index=p*8+i
if(index>=photoList.length) break

let img=photoList[index]

ctx.drawImage(
img,
0,
0,
img.width,
img.height,
positions[i][0],
positions[i][1],
photoWidth,
photoHeight
)

}

pages.push(canvas)
document.getElementById("preview").appendChild(canvas)

}

}

function downloadPNG(){

if(pages.length===0){
alert("Generate sheets first")
return
}

pages.forEach((canvas,i)=>{

let link=document.createElement("a")

link.download="passport_page_"+(i+1)+".png"
link.href=canvas.toDataURL("image/png")

link.click()

})

}

function downloadPDF(){

if(pages.length===0){
alert("Generate sheets first")
return
}

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"landscape",
unit:"in",
format:[6,4]
})

pages.forEach((canvas,i)=>{

let img=canvas.toDataURL("image/png")

if(i>0) pdf.addPage()

pdf.addImage(img,"PNG",0,0,6,4)

})

pdf.save("passport_photos.pdf")

}

</script>

</body>
</html>
