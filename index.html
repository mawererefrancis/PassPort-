<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

const DPI = 300
const photoW = 450
const photoH = 600

const pageWidth = 1800
const pageHeight = 1200

let pages = []

function generateSheets(){

pages=[]

const files=document.getElementById("upload").files
const brightness=document.getElementById("brightness").value
const removeBG=document.getElementById("removeBG")?.checked
const showName=document.getElementById("showName").checked

if(files.length==0){
alert("Upload photos first")
return
}

let images=[]
let loaded=0

for(let file of files){

let img=new Image()

img.onload=function(){

images.push({img:img,name:file.name})
loaded++

if(loaded===files.length){
processImages(images,brightness,removeBG,showName)
}

}

img.src=URL.createObjectURL(file)

}

}

function processImages(images,brightness,removeBG,showName){

let perPage=8
let totalPages=Math.ceil(images.length/perPage)

for(let p=0;p<totalPages;p++){

let canvas=document.createElement("canvas")
canvas.width=pageWidth
canvas.height=pageHeight

let ctx=canvas.getContext("2d")

let positions=[
[0,0],[450,0],[900,0],[1350,0],
[0,600],[450,600],[900,600],[1350,600]
]

for(let i=0;i<8;i++){

let index=p*8+i
if(index>=images.length) break

let img=images[index].img
let name=images[index].name

let pos=positions[i]

let crop=Math.min(img.width,img.height)

let sx=(img.width-crop)/2
let sy=(img.height-crop)/2

/* skin smoothing + color */

ctx.filter=
`brightness(${brightness}%)
 contrast(110%)
 saturate(105%)
 blur(0.4px)`

ctx.drawImage(
img,
sx,sy,crop,crop,
pos[0],pos[1],
photoW,photoH
)

/* background whitening */

if(removeBG){

ctx.fillStyle="rgba(255,255,255,0.15)"
ctx.fillRect(pos[0],pos[1],photoW,photoH)

}

/* learner name */

if(showName){

ctx.fillStyle="black"
ctx.font="22px Arial"
ctx.textAlign="center"

let label=name.split(".")[0]

ctx.fillText(
label,
pos[0]+photoW/2,
pos[1]+photoH-8
)

}

}

pages.push(canvas)

document.getElementById("preview").appendChild(canvas)

}

}

async function downloadPNG(){

if(pages.length==0){
alert("Generate sheets first")
return
}

let zip=new JSZip()

for(let i=0;i<pages.length;i++){

let canvas=pages[i]

let data=canvas.toDataURL("image/png")

let base64=data.split(",")[1]

zip.file("page_"+(i+1)+".png",base64,{base64:true})

}

let content=await zip.generateAsync({type:"blob"})

let link=document.createElement("a")

link.href=URL.createObjectURL(content)

link.download="passport_pages.zip"

link.click()

}

function downloadPDF(){

if(pages.length==0){
alert("Generate sheets first")
return
}

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"landscape",
unit:"px",
format:[pageWidth,pageHeight]
})

pages.forEach((canvas,i)=>{

let img=canvas.toDataURL("image/png")

if(i>0) pdf.addPage()

pdf.addImage(img,"PNG",0,0,pageWidth,pageHeight)

})

pdf.save("passport_photos.pdf")

}

</script>
