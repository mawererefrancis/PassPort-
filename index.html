<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Passport Photo Studio · Pro</title>
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* (Same polished styles – no changes) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        #loginPage {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .loginBox {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            padding: 2.5rem 2rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .loginBox h2 {
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 1.8rem;
            font-size: 2rem;
            letter-spacing: -0.5px;
        }

        .loginBox input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border: 2px solid #e9eef2;
            border-radius: 60px;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
            background: white;
        }

        .loginBox input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42,82,152,0.2);
        }

        .loginBox button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            width: 100%;
            margin: 20px 0 15px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        .loginBox button:hover {
            background: #2a5298;
            transform: scale(1.02);
        }

        .dev {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #4a5568;
            border-top: 1px dashed #cbd5e0;
            padding-top: 20px;
        }

        .dev b {
            color: #1e3c72;
        }

        #app {
            display: none;
            width: 100%;
            max-width: 1600px;
            margin: 20px;
            background: #f8fafc;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            padding: 30px;
            backdrop-filter: blur(2px);
        }

        .topbar {
            background: #1e3c72;
            color: white;
            padding: 22px 28px;
            border-radius: 30px;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 0 #0f2542;
        }

        .controls {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.2);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            align-items: flex-end;
        }

        .control-group {
            min-width: 180px;
            flex: 1 1 auto;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .control-group input[type="file"] {
            padding: 10px 0;
            width: 100%;
        }

        .control-group input[type="range"] {
            width: 100%;
            margin: 5px 0;
        }

        .control-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .btn {
            background: #1e3c72;
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 5px 0 #0f2542;
            border: 1px solid #2d4b7c;
            margin: 0 5px 5px 0;
        }

        .btn:hover {
            background: #2a5298;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #0f2542;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #0f2542;
        }

        .btn.secondary {
            background: #475569;
            box-shadow: 0 5px 0 #1e293b;
            border-color: #334155;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .preview-header h3 {
            color: #1e293b;
            font-weight: 600;
        }

        #preview {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            background: #e9eef2;
            border-radius: 40px;
            padding: 30px;
            min-height: 300px;
            border: 2px dashed #94a3b8;
        }

        .preview-canvas {
            border-radius: 24px;
            box-shadow: 0 12px 25px -8px rgba(0,0,0,0.4);
            border: 4px solid white;
            max-width: 100%;
            height: auto;
        }

        .badge {
            background: #2a5298;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        #loadingIndicator {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #1e3c72;
            font-weight: 600;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 4px solid #cbd5e1;
            border-top-color: #1e3c72;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="loginBox">
        <h2>📸 Passport Studio</h2>
        <input type="text" id="user" placeholder="Username" value="admin">
        <input type="password" id="pass" placeholder="Password" value="1234">
        <button id="loginBtn">Login →</button>
        <div class="dev">
            Developed by <b>MAWERERE FRANCIS</b><br>
            📞 0788223215 · 📱 +256788223215
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div id="app">
    <div class="topbar">
        <span>🏫 School Passport Photo System</span>
        <span class="badge">v3.0 · Memory‑optimized</span>
    </div>

    <div class="controls">
        <div class="control-group" style="flex:2">
            <label>📁 Upload photos (JPEG/PNG)</label>
            <input type="file" id="upload" multiple accept="image/*">
        </div>
        <div class="control-group">
            <label>🔆 Brightness</label>
            <input type="range" id="brightness" min="70" max="150" value="105">
        </div>
        <div class="control-group">
            <label style="display: flex; align-items: center;">
                <input type="checkbox" id="whiteBG"> ⚪ White background boost
            </label>
            <label style="display: flex; align-items: center;">
                <input type="checkbox" id="showName"> 🏷️ Show file name
            </label>
        </div>
        <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-left: auto;">
            <button class="btn" id="generateBtn">✨ Generate sheets</button>
            <button class="btn" id="downloadPNGBtn">📦 PNG (ZIP)</button>
            <button class="btn" id="downloadPDFBtn">📄 PDF</button>
            <button class="btn secondary" id="resetBtn">↻ Reset</button>
        </div>
    </div>

    <div class="preview-header">
        <h3>📋 Preview (first 3 sheets)</h3>
        <div id="loadingIndicator"><span class="spinner"></span> Processing ...</div>
    </div>
    <div id="preview"></div>
</div>

<script>
(function() {
    "use strict";

    // --- Configuration ---
    const PHOTO_W = 450;
    const PHOTO_H = 600;
    const PAGE_W = 1800;
    const PAGE_H = 1200;
    const PHOTOS_PER_PAGE = 8;
    const PREVIEW_PAGES = 3;       // only keep these many in memory

    const GRID = [
        [0, 0], [450, 0], [900, 0], [1350, 0],
        [0, 600], [450, 600], [900, 600], [1350, 600]
    ];

    // --- State ---
    let imageList = [];             // array of {img, name} – loaded images
    let previewPages = [];          // canvases for preview (first few pages)
    let abortController = null;

    // --- DOM Elements ---
    const loginPage = document.getElementById('loginPage');
    const app = document.getElementById('app');
    const userInput = document.getElementById('user');
    const passInput = document.getElementById('pass');
    const loginBtn = document.getElementById('loginBtn');
    const upload = document.getElementById('upload');
    const brightnessRange = document.getElementById('brightness');
    const whiteBGCB = document.getElementById('whiteBG');
    const showNameCB = document.getElementById('showName');
    const generateBtn = document.getElementById('generateBtn');
    const downloadPNGBtn = document.getElementById('downloadPNGBtn');
    const downloadPDFBtn = document.getElementById('downloadPDFBtn');
    const resetBtn = document.getElementById('resetBtn');
    const previewDiv = document.getElementById('preview');
    const loadingIndicator = document.getElementById('loadingIndicator');

    // --- Login ---
    loginBtn.addEventListener('click', () => {
        if (userInput.value === 'admin' && passInput.value === '1234') {
            loginPage.style.display = 'none';
            app.style.display = 'block';
        } else {
            alert('❌ Incorrect credentials (use admin/1234)');
        }
    });

    // --- Reset ---
    resetBtn.addEventListener('click', () => {
        // Release image object URLs
        imageList.forEach(item => URL.revokeObjectURL(item.img.src));
        imageList = [];
        previewPages = [];
        previewDiv.innerHTML = '';
        upload.value = '';
        if (abortController) {
            abortController.abort();
            abortController = null;
        }
    });

    // --- Generate Sheets (preview only) ---
    generateBtn.addEventListener('click', async () => {
        const files = upload.files;
        if (!files || files.length === 0) {
            alert('📂 Please select photos first.');
            return;
        }

        // Abort previous generation if any
        if (abortController) abortController.abort();
        abortController = new AbortController();
        const signal = abortController.signal;

        // Clear previous previews
        previewPages.forEach(c => c = null);
        previewPages = [];
        previewDiv.innerHTML = '';

        // Release old image URLs
        imageList.forEach(item => URL.revokeObjectURL(item.img.src));
        imageList = [];

        loadingIndicator.style.display = 'flex';

        try {
            // 1. Load all images
            const loadPromises = [];
            for (let file of files) {
                if (signal.aborted) break;
                loadPromises.push(loadImage(file, signal));
            }
            const loaded = await Promise.all(loadPromises);
            imageList = loaded.filter(img => img !== null);

            if (imageList.length === 0) throw new Error('No valid images');

            // 2. Generate only preview pages (first few)
            const brightness = parseInt(brightnessRange.value, 10);
            const whiteBG = whiteBGCB.checked;
            const showName = showNameCB.checked;

            await generatePreview(imageList, brightness, whiteBG, showName, signal);

        } catch (err) {
            if (err.name !== 'AbortError') {
                alert('⚠️ Processing failed: ' + err.message);
                console.error(err);
            }
        } finally {
            loadingIndicator.style.display = 'none';
            abortController = null;
        }
    });

    // Load one image – returns {img, name} or null
    function loadImage(file, signal) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                if (signal.aborted) {
                    resolve(null);
                    return;
                }
                const img = new Image();
                img.onload = () => {
                    // Keep object URL for later use; we'll revoke on reset
                    resolve({ img, name: file.name });
                };
                img.onerror = () => {
                    URL.revokeObjectURL(img.src);
                    console.warn('Failed to load:', file.name);
                    resolve(null);
                };
                img.src = e.target.result;
            };
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(file);
        });
    }

    // Generate only the first PREVIEW_PAGES and store in previewPages
    async function generatePreview(images, brightness, whiteBG, showName, signal) {
        const totalPages = Math.ceil(images.length / PHOTOS_PER_PAGE);
        const pagesToShow = Math.min(totalPages, PREVIEW_PAGES);

        for (let pageIdx = 0; pageIdx < pagesToShow; pageIdx++) {
            if (signal.aborted) break;

            const canvas = await renderPage(images, pageIdx, brightness, whiteBG, showName);
            previewPages.push(canvas);

            // Add to preview area (scaled down for display)
            const previewCanvas = canvas.cloneNode(true);
            previewCanvas.classList.add('preview-canvas');
            previewCanvas.style.width = 'min(100%, 540px)';
            previewDiv.appendChild(previewCanvas);

            // Yield to keep UI responsive
            await new Promise(r => setTimeout(r, 0));
        }
    }

    // Render a single page (index starting at 0) and return canvas
    async function renderPage(images, pageIdx, brightness, whiteBG, showName) {
        const canvas = document.createElement('canvas');
        canvas.width = PAGE_W;
        canvas.height = PAGE_H;
        const ctx = canvas.getContext('2d', { alpha: false });
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, PAGE_W, PAGE_H);

        const startIdx = pageIdx * PHOTOS_PER_PAGE;
        for (let i = 0; i < PHOTOS_PER_PAGE; i++) {
            const imgIndex = startIdx + i;
            if (imgIndex >= images.length) break;

            const { img, name } = images[imgIndex];
            const [x, y] = GRID[i];

            // Crop to passport ratio
            const photoCanvas = cropToPassport(img, PHOTO_W, PHOTO_H);

            // Apply filters
            applyFilters(photoCanvas, brightness, whiteBG);

            // Draw onto page
            ctx.drawImage(photoCanvas, x, y, PHOTO_W, PHOTO_H);

            // Optional name
            if (showName) {
                ctx.font = 'bold 24px "Segoe UI", Arial, sans-serif';
                ctx.fillStyle = '#1e293b';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'white';
                ctx.shadowBlur = 6;
                ctx.fillText(cleanName(name), x + PHOTO_W/2, y + PHOTO_H - 20);
                ctx.shadowColor = 'transparent';
            }
        }
        return canvas;
    }

    // Crop image to target dimensions (center, maintain aspect)
    function cropToPassport(img, targetW, targetH) {
        const canvas = document.createElement('canvas');
        canvas.width = targetW;
        canvas.height = targetH;
        const ctx = canvas.getContext('2d');

        const sourceW = img.width;
        const sourceH = img.height;
        const targetAR = targetW / targetH; // 0.75

        let sx, sy, sWidth, sHeight;

        if (sourceW / sourceH > targetAR) {
            // Image is wider: crop width
            sHeight = sourceH;
            sWidth = sourceH * targetAR;
            sx = (sourceW - sWidth) / 2;
            sy = 0;
        } else {
            // Image is taller or equal: crop height
            sWidth = sourceW;
            sHeight = sourceW / targetAR;
            sx = 0;
            sy = (sourceH - sHeight) / 2;
        }

        ctx.drawImage(img, sx, sy, sWidth, sHeight, 0, 0, targetW, targetH);
        return canvas;
    }

    // Apply filters for skin smoothing & whitening
    function applyFilters(photoCanvas, brightness, whiteBG) {
        const ctx = photoCanvas.getContext('2d');
        let filter = `brightness(${brightness}%) contrast(108%) saturate(105%) blur(0.3px)`;
        if (whiteBG) {
            filter = `brightness(${Math.min(130, brightness+10)}%) contrast(118%) saturate(102%) blur(0.3px)`;
        }
        ctx.filter = filter;
        ctx.drawImage(photoCanvas, 0, 0);
        ctx.filter = 'none';
    }

    // Clean filename for display
    function cleanName(filename) {
        return filename.replace(/\.[^/.]+$/, "").substring(0, 20);
    }

    // --- ZIP download (regenerates pages on the fly, no memory buildup) ---
    downloadPNGBtn.addEventListener('click', async () => {
        if (imageList.length === 0) {
            alert('Please generate sheets first (or upload photos).');
            return;
        }

        const totalPages = Math.ceil(imageList.length / PHOTOS_PER_PAGE);
        const brightness = parseInt(brightnessRange.value, 10);
        const whiteBG = whiteBGCB.checked;
        const showName = showNameCB.checked;

        loadingIndicator.style.display = 'flex';
        try {
            const zip = new JSZip();

            for (let pageIdx = 0; pageIdx < totalPages; pageIdx++) {
                // Render one page
                const canvas = await renderPage(imageList, pageIdx, brightness, whiteBG, showName);
                // Convert to blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 0.9));
                zip.file(`page_${pageIdx+1}.png`, blob);
                // Free canvas
                canvas.width = 0;
                canvas.height = 0;

                // Update UI occasionally
                if (pageIdx % 5 === 0) await new Promise(r => setTimeout(r, 0));
            }

            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'passport_sheets.zip';
            a.click();
            URL.revokeObjectURL(url);
        } catch (err) {
            alert('ZIP creation failed: ' + err.message);
        } finally {
            loadingIndicator.style.display = 'none';
        }
    });

    // --- PDF download (regenerates pages on the fly) ---
    downloadPDFBtn.addEventListener('click', async () => {
        if (imageList.length === 0) {
            alert('Please generate sheets first (or upload photos).');
            return;
        }

        const totalPages = Math.ceil(imageList.length / PHOTOS_PER_PAGE);
        const brightness = parseInt(brightnessRange.value, 10);
        const whiteBG = whiteBGCB.checked;
        const showName = showNameCB.checked;

        loadingIndicator.style.display = 'flex';
        try {
            const { jsPDF } = window.jspdf;
            const pdfW = 432; // 6 * 72
            const pdfH = 288; // 4 * 72

            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'pt',
                format: [pdfW, pdfH]
            });

            for (let pageIdx = 0; pageIdx < totalPages; pageIdx++) {
                if (pageIdx > 0) pdf.addPage();

                const canvas = await renderPage(imageList, pageIdx, brightness, whiteBG, showName);
                const imgData = canvas.toDataURL('image/png', 0.9);
                pdf.addImage(imgData, 'PNG', 0, 0, pdfW, pdfH, undefined, 'FAST');

                // Free canvas
                canvas.width = 0;
                canvas.height = 0;

                if (pageIdx % 5 === 0) await new Promise(r => setTimeout(r, 0));
            }

            pdf.save('passport_photos.pdf');
        } catch (err) {
            alert('PDF generation failed: ' + err.message);
        } finally {
            loadingIndicator.style.display = 'none';
        }
    });

    // Clean up on page unload
    window.addEventListener('beforeunload', () => {
        imageList.forEach(item => URL.revokeObjectURL(item.img.src));
    });
})();
</script>
</body>
</html>
