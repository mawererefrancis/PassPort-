<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>School Passport Photo Studio</title>

<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* LOGIN */

#loginPage{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

.loginBox{
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

.loginBox input{
width:90%;
padding:10px;
margin:10px 0;
}

.loginBox button{
padding:10px 20px;
cursor:pointer;
}

/* APP */

#app{
display:none;
padding:20px;
}

.topbar{
background:#2c3e50;
color:white;
padding:10px;
}

.controls{
background:white;
padding:15px;
border-radius:6px;
margin-bottom:20px;
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
}

canvas{
border:1px solid #ccc;
margin:10px;
}

#preview{
display:flex;
flex-wrap:wrap;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h3>Passport Studio Login</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- APP -->

<div id="app">

<div class="topbar">
School Passport Photo Studio
</div>

<div class="controls">

Upload Photos
<br>
<input type="file" id="upload" multiple accept="image/*">

<br><br>

Layout

<select id="layout">
<option value="4x6">4x6 (8 photos)</option>
<option value="A4">A4 (40 photos)</option>
</select>

<br><br>

<input type="checkbox" id="removeBG"> Remove Background

<br><br>

Show learner name under photo

<input type="checkbox" id="showName">

<br><br>

Brightness

<input type="range" id="brightness" min="80" max="130" value="100">

<br><br>

<button onclick="generate()">Generate Sheets</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="preview"></div>

</div>

<script>

/* LOGIN */

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u==="admin" && p==="1234"){

document.getElementById("loginPage").style.display="none"
document.getElementById("app").style.display="block"

}else{

alert("Wrong login")

}

}

/* PHOTO SETTINGS */

const DPI=300
const photoW=450
const photoH=600

let pages=[]

async function generate(){

const files=document.getElementById("upload").files
const layout=document.getElementById("layout").value
const brightness=document.getElementById("brightness").value
const removeBG=document.getElementById("removeBG").checked
const showName=document.getElementById("showName").checked

if(files.length==0){
alert("Upload photos")
return
}

await faceapi.nets.tinyFaceDetector.loadFromUri("https://cdn.jsdelivr.net/npm/face-api.js/weights")

let photos=[]

for(let file of files){

let img=new Image()
img.src=URL.createObjectURL(file)

await new Promise(r=>img.onload=r)

let canvas=document.createElement("canvas")
canvas.width=photoW
canvas.height=photoH

let ctx=canvas.getContext("2d")

ctx.filter=`brightness(${brightness}%) contrast(105%)`

let face=await faceapi.detectSingleFace(img,new faceapi.TinyFaceDetectorOptions())

if(face){

let box=face.box

let size=Math.max(box.width,box.height)*2

let sx=Math.max(0,box.x+box.width/2-size/2)
let sy=Math.max(0,box.y+box.height/2-size/2)

ctx.drawImage(img,sx,sy,size,size,0,0,photoW,photoH)

}else{

ctx.drawImage(img,0,0,photoW,photoH)

}

if(removeBG){
await removeBackground(canvas)
}

if(showName){

ctx.fillStyle="black"
ctx.font="28px Arial"
ctx.textAlign="center"

let name=file.name.split(".")[0]

ctx.fillText(name,photoW/2,photoH-10)

}

photos.push(canvas)

}

buildPages(photos,layout)

}

/* BACKGROUND REMOVE */

async function removeBackground(canvas){

const net=await bodyPix.load()

const segmentation=await net.segmentPerson(canvas)

let ctx=canvas.getContext("2d")
let img=ctx.getImageData(0,0,canvas.width,canvas.height)

for(let i=0;i<segmentation.data.length;i++){

if(segmentation.data[i]==0){

img.data[i*4]=255
img.data[i*4+1]=255
img.data[i*4+2]=255

}

}

ctx.putImageData(img,0,0)

}

/* BUILD PAGE */

function buildPages(list,layout){

pages=[]

let perPage=layout==="A4"?40:8

let pageW=layout==="A4"?2480:1800
let pageH=layout==="A4"?3508:1200

let cols=layout==="A4"?5:4
let rows=layout==="A4"?8:2

let preview=document.getElementById("preview")
preview.innerHTML=""

let total=Math.ceil(list.length/perPage)

for(let p=0;p<total;p++){

let canvas=document.createElement("canvas")
canvas.width=pageW
canvas.height=pageH

let ctx=canvas.getContext("2d")

for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){

let index=p*perPage+r*cols+c
if(index>=list.length) break

let x=c*photoW
let y=r*photoH

ctx.drawImage(list[index],x,y,photoW,photoH)

}

}

pages.push(canvas)
preview.appendChild(canvas)

}

}

/* DOWNLOAD */

function downloadPNG(){

pages.forEach((c,i)=>{

let a=document.createElement("a")
a.download="passport_"+(i+1)+".png"
a.href=c.toDataURL()

a.click()

})

}

function downloadPDF(){

const {jsPDF}=window.jspdf

let pdf=new jsPDF({orientation:"portrait",unit:"px",format:"a4"})

pages.forEach((c,i)=>{

let img=c.toDataURL("image/png")

if(i>0) pdf.addPage()

pdf.addImage(img,"PNG",0,0)

})

pdf.save("passport_photos.pdf")

}

</script>

</body>
</html>
