<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Passport Photo Studio</title>

<script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h2{
text-align:center;
}

.controls{
background:white;
padding:15px;
border-radius:6px;
margin-bottom:20px;
}

canvas{
border:1px solid #ccc;
margin:10px;
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h2>School Passport Photo Studio</h2>

<div class="controls">

Upload Photos
<br>
<input type="file" id="upload" multiple accept="image/*">

<br><br>

Duplicates (if single photo)
<br>
<input type="number" id="duplicates" value="8">

<br><br>

Brightness
<br>
<input type="range" id="brightness" min="80" max="140" value="100">

<br><br>

<input type="checkbox" id="removeBG">
Remove Background (White)

<br><br>

<button onclick="generate()">Generate Sheets</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="preview"></div>

<script>

const DPI=300

const pageWidth=6*DPI
const pageHeight=4*DPI

const photoW=1.5*DPI
const photoH=2*DPI

let pages=[]

async function generate(){

const files=document.getElementById("upload").files
const dup=parseInt(document.getElementById("duplicates").value)
const brightness=document.getElementById("brightness").value
const removeBG=document.getElementById("removeBG").checked

const preview=document.getElementById("preview")
preview.innerHTML=""

if(files.length==0){
alert("Upload photos")
return
}

await faceapi.nets.tinyFaceDetector.loadFromUri(
"https://cdn.jsdelivr.net/npm/face-api.js/weights"
)

let images=[]

for(let file of files){

let img=new Image()
img.src=URL.createObjectURL(file)

await new Promise(r=>img.onload=r)

let canvas=document.createElement("canvas")
canvas.width=photoW
canvas.height=photoH

let ctx=canvas.getContext("2d")

ctx.filter=`brightness(${brightness}%)`

let face=await faceapi.detectSingleFace(
img,
new faceapi.TinyFaceDetectorOptions()
)

if(face){

let box=face.box

ctx.drawImage(
img,
box.x,
box.y,
box.width,
box.height,
0,
0,
photoW,
photoH
)

}else{

ctx.drawImage(img,0,0,photoW,photoH)

}

smooth(ctx)

if(removeBG){
await removeBackground(canvas)
}

images.push(canvas)

}

let photoList=[]

if(images.length==1){

for(let i=0;i<dup;i++)
photoList.push(images[0])

}else{

photoList=images

}

buildPages(photoList)

}

function smooth(ctx){

ctx.globalAlpha=0.95
ctx.filter+=" contrast(105%)"

}

async function removeBackground(canvas){

const net=await bodyPix.load()

const segmentation=await net.segmentPerson(canvas)

const ctx=canvas.getContext("2d")
const imgData=ctx.getImageData(0,0,canvas.width,canvas.height)

for(let i=0;i<segmentation.data.length;i++){

if(segmentation.data[i]==0){

imgData.data[i*4]=255
imgData.data[i*4+1]=255
imgData.data[i*4+2]=255

}

}

ctx.putImageData(imgData,0,0)

}

function buildPages(list){

pages=[]

const preview=document.getElementById("preview")

let perPage=8

let total=Math.ceil(list.length/perPage)

for(let p=0;p<total;p++){

let canvas=document.createElement("canvas")
canvas.width=pageWidth
canvas.height=pageHeight

let ctx=canvas.getContext("2d")

let pos=[
[0,0],[450,0],[900,0],[1350,0],
[0,600],[450,600],[900,600],[1350,600]
]

for(let i=0;i<8;i++){

let index=p*8+i

if(index>=list.length) break

ctx.drawImage(
list[index],
pos[i][0],
pos[i][1],
photoW,
photoH
)

}

pages.push(canvas)
preview.appendChild(canvas)

}

}

function downloadPNG(){

pages.forEach((canvas,i)=>{

let a=document.createElement("a")

a.download="passport_page_"+(i+1)+".png"
a.href=canvas.toDataURL()

a.click()

})

}

function downloadPDF(){

const {jsPDF}=window.jspdf

let pdf=new jsPDF({
orientation:"landscape",
unit:"in",
format:[6,4]
})

pages.forEach((canvas,i)=>{

let img=canvas.toDataURL("image/png")

if(i>0) pdf.addPage()

pdf.addImage(img,"PNG",0,0,6,4)

})

pdf.save("passport_photos.pdf")

}

</script>

</body>
</html>
